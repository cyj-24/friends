<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚐 房车环游中国 - 实时直播</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #ff6b35;
            --secondary: #f7931e;
            --accent: #ffd93d;
            --dark: #1a1a2e;
            --light: #f7f5f0;
            --pixel-bg: #2d3436;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--light);
            min-height: 100vh;
        }

        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(255,107,53,0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .rv-icon {
            font-size: 36px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        .current-location {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* 主布局 */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .main-container { grid-template-columns: 1fr; }
        }

        /* 左侧面板 */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 地图区域 */
        .map-section {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #map {
            height: 400px;
            width: 100%;
        }

        .map-legend {
            display: flex;
            gap: 16px;
            padding: 12px 20px;
            background: #f8f9fa;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* 旅行日志 */
        .logs-section {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .logs-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .log-item {
            display: flex;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .log-item:hover {
            background: #f8f9fa;
            border-radius: 8px;
        }

        .log-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .log-content {
            flex: 1;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .log-author {
            font-weight: 600;
            font-size: 14px;
        }

        .log-time {
            font-size: 12px;
            color: #999;
        }

        .log-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        .log-location {
            font-size: 12px;
            color: var(--primary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .log-image {
            margin-top: 8px;
            border-radius: 8px;
            max-width: 200px;
            max-height: 150px;
            object-fit: cover;
        }

        /* 右侧Agent面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 用户切换器（仅团队成员可见） */
        .user-switcher {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .switcher-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 20px;
            background: #f5f5f5;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .user-chip:hover, .user-chip.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .user-chip-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: white;
        }

        /* Agent卡片 */
        .agent-grid {
            display: grid;
            gap: 12px;
        }

        .agent-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .agent-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .agent-card.own {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(255,107,53,0.05) 0%, rgba(247,147,30,0.05) 100%);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .agent-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .agent-role {
            font-size: 12px;
            color: #666;
        }

        .agent-status {
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-online {
            background: rgba(72,187,120,0.1);
            color: #48bb78;
        }

        .status-offline {
            background: rgba(160,174,192,0.1);
            color: #a0aec0;
        }

        .agent-details {
            display: grid;
            gap: 10px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .detail-row.activity {
            background: linear-gradient(135deg, rgba(255,107,53,0.1) 0%, rgba(247,147,30,0.1) 100%);
            border: 1px solid rgba(255,107,53,0.2);
        }

        .detail-icon {
            width: 24px;
            text-align: center;
            font-size: 16px;
        }

        .detail-label {
            color: #666;
            min-width: 50px;
            font-size: 12px;
        }

        .detail-value {
            font-weight: 600;
            color: #333;
        }

        .detail-value.activity-text {
            color: var(--primary);
            font-size: 14px;
        }

        /* 活动时间轴 */
        .timeline-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-top: 20px;
        }

        .timeline-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .timeline-filter-btn {
            padding: 6px 14px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .timeline-filter-btn:hover, .timeline-filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .timeline-item {
            position: relative;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--primary);
        }

        .timeline-item.milestone::before {
            background: var(--primary);
            width: 16px;
            height: 16px;
            left: -28px;
        }

        .timeline-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .timeline-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .timeline-meta {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .timeline-agent {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .view-details-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .view-details-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* 房车图标（地图上点击） */
        .rv-marker-clickable {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .rv-marker-clickable:hover {
            transform: scale(1.2);
        }

        /* 车内像素场景 */
        .rv-interior-modal {
            background: #1a1a2e !important;
            font-family: 'Press Start 2P', monospace;
        }

        .rv-interior-scene {
            background: #5d4e37;
            padding: 20px;
            position: relative;
            min-height: 500px;
            image-rendering: pixelated;
        }

        .rv-interior-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b35;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
        }

        .rv-interior-title {
            text-align: center;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #000;
        }

        /* 像素地板 */
        .pixel-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: repeating-linear-gradient(
                0deg,
                #8b7355 0px,
                #8b7355 8px,
                #a0826d 8px,
                #a0826d 16px
            );
            border-top: 4px solid #3d3226;
        }

        /* 像素家具 */
        .pixel-furniture {
            position: absolute;
            background: #6c5ce7;
            border: 4px solid #3d3226;
        }

        .pixel-sofa {
            bottom: 80px;
            right: 40px;
            width: 120px;
            height: 60px;
            background: #e17055;
        }

        .pixel-sofa::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
            background: #d63031;
            border: 4px solid #3d3226;
            border-bottom: none;
        }

        .pixel-table {
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 50px;
            background: #a0522d;
        }

        .pixel-window {
            position: absolute;
            width: 80px;
            height: 60px;
            background: #87ceeb;
            border: 4px solid #3d3226;
            top: 20px;
        }

        .pixel-window::before, .pixel-window::after {
            content: '';
            position: absolute;
            background: #3d3226;
        }

        .pixel-window::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
        }

        .pixel-window::after {
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
        }

        /* 像素人 */
        .rv-pixel-person {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .rv-pixel-person:hover {
            transform: scale(1.1);
        }

        .rv-pixel-avatar {
            width: 48px;
            height: 64px;
            position: relative;
        }

        .rv-pixel-head, .rv-pixel-body {
            position: relative;
        }

        .rv-pixel-head {
            width: 32px;
            height: 32px;
            margin: 0 auto;
        }

        .rv-pixel-body {
            width: 40px;
            height: 28px;
            margin: 4px auto 0;
        }

        .rv-pixel {
            position: absolute;
            width: 8px;
            height: 8px;
        }

        /* JCL - 蓝色 */
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(1) { top: 0; left: 8px; background: #ffccaa; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(2) { top: 0; left: 16px; background: #ffccaa; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(3) { top: 8px; left: 0; background: #0984e3; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(4) { top: 8px; left: 8px; background: #ffccaa; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(5) { top: 8px; left: 16px; background: #ffccaa; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(6) { top: 8px; left: 24px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(7) { top: 16px; left: 8px; background: #ffccaa; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(8) { top: 16px; left: 16px; background: #ffccaa; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(9) { top: 24px; left: 8px; background: #6d4c41; }
        .rv-person-jcl .rv-pixel-head .rv-pixel:nth-child(10) { top: 24px; left: 16px; background: #6d4c41; }

        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(1) { top: 0; left: 0; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(2) { top: 0; left: 8px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(3) { top: 0; left: 16px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(4) { top: 0; left: 24px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(5) { top: 0; left: 32px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(6) { top: 8px; left: 0; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(7) { top: 8px; left: 8px; background: #74b9ff; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(8) { top: 8px; left: 16px; background: #74b9ff; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(9) { top: 8px; left: 24px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(10) { top: 8px; left: 32px; background: #0984e3; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(11) { top: 16px; left: 8px; background: #2d3436; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(12) { top: 16px; left: 16px; background: #2d3436; }
        .rv-person-jcl .rv-pixel-body .rv-pixel:nth-child(13) { top: 16px; left: 24px; background: #2d3436; }

        /* PYJ - 粉色 */
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(1) { top: 0; left: 8px; background: #ffccaa; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(2) { top: 0; left: 16px; background: #ffccaa; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(3) { top: 8px; left: 0; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(4) { top: 8px; left: 8px; background: #ffccaa; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(5) { top: 8px; left: 16px; background: #ffccaa; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(6) { top: 8px; left: 24px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(7) { top: 16px; left: 8px; background: #ffccaa; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(8) { top: 16px; left: 16px; background: #ffccaa; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(9) { top: 24px; left: 8px; background: #d63031; }
        .rv-person-pyj .rv-pixel-head .rv-pixel:nth-child(10) { top: 24px; left: 16px; background: #d63031; }

        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(1) { top: 0; left: 0; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(2) { top: 0; left: 8px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(3) { top: 0; left: 16px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(4) { top: 0; left: 24px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(5) { top: 0; left: 32px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(6) { top: 8px; left: 0; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(7) { top: 8px; left: 8px; background: #fab1a0; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(8) { top: 8px; left: 16px; background: #fab1a0; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(9) { top: 8px; left: 24px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(10) { top: 8px; left: 32px; background: #fd79a8; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(11) { top: 16px; left: 8px; background: #2d3436; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(12) { top: 16px; left: 16px; background: #2d3436; }
        .rv-person-pyj .rv-pixel-body .rv-pixel:nth-child(13) { top: 16px; left: 24px; background: #2d3436; }

        /* LWJ - 绿色 */
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(1) { top: 0; left: 8px; background: #ffccaa; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(2) { top: 0; left: 16px; background: #ffccaa; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(3) { top: 8px; left: 0; background: #00b894; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(4) { top: 8px; left: 8px; background: #ffccaa; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(5) { top: 8px; left: 16px; background: #ffccaa; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(6) { top: 8px; left: 24px; background: #00b894; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(7) { top: 16px; left: 8px; background: #ffccaa; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(8) { top: 16px; left: 16px; background: #ffccaa; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(9) { top: 24px; left: 8px; background: #6d4c41; }
        .rv-person-lwj .rv-pixel-head .rv-pixel:nth-child(10) { top: 24px; left: 16px; background: #6d4c41; }

        .rv-person-lwj .rv-pixel-body .rv-pixel:nth-child(10) { top: 8px; left: 32px; background: #00b894; }

        .rv-person-lwj .rv-pixel-body .rv-pixel:nth-child(12) { top: 16px; left: 16px; background: #2d3436; }
        .rv-person-lwj .rv-pixel-body .rv-pixel:nth-child(13) { top: 16px; left: 24px; background: #2d3436; }

        /* CYJ - 紫色 */
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(1) { top: 0; left: 8px; background: #ffccaa; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(2) { top: 0; left: 16px; background: #ffccaa; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(3) { top: 8px; left: 0; background: #a29bfe; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(4) { top: 8px; left: 8px; background: #ffccaa; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(5) { top: 8px; left: 16px; background: #ffccaa; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(6) { top: 8px; left: 24px; background: #a29bfe; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(7) { top: 16px; left: 8px; background: #ffccaa; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(8) { top: 16px; left: 16px; background: #ffccaa; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(9) { top: 24px; left: 8px; background: #d63031; }
        .rv-person-cyj .rv-pixel-head .rv-pixel:nth-child(10) { top: 24px; left: 16px; background: #d63031; }

        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(1) { top: 0; left: 0; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(2) { top: 0; left: 8px; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(3) { top: 0; left: 16px; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(4) { top: 0; left: 24px; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(5) { top: 0; left: 32px; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(6) { top: 8px; left: 0; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(7) { top: 8px; left: 8px; background: #a29bfe; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(8) { top: 8px; left: 16px; background: #a29bfe; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(9) { top: 8px; left: 24px; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(10) { top: 8px; left: 32px; background: #6c5ce7; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(11) { top: 16px; left: 8px; background: #2d3436; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(12) { top: 16px; left: 16px; background: #2d3436; }
        .rv-person-cyj .rv-pixel-body .rv-pixel:nth-child(13) { top: 16px; left: 24px; background: #2d3436; }

        /* 状态气泡 */
        .rv-status-bubble {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 3px solid #000;
            padding: 6px 10px;
            font-size: 10px;
            color: #000;
            white-space: nowrap;
            z-index: 20;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }

        .rv-status-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #000;
        }

        .rv-name-tag {
            margin-top: 6px;
            padding: 4px 8px;
            background: #000;
            color: #fff;
            font-size: 10px;
            border: 2px solid #fff;
        }

        /* 能量条 */
        .energy-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .energy-track {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .energy-high { background: linear-gradient(90deg, #48bb78, #68d391); }
        .energy-medium { background: linear-gradient(90deg, #ecc94b, #f6e05e); }
        .energy-low { background: linear-gradient(90deg, #f56565, #fc8181); }

        .energy-text {
            font-size: 12px;
            color: #666;
            min-width: 30px;
        }

        /* 更新表单（仅自己的卡片显示） */
        .update-form {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #ddd;
        }

        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .form-input, .form-select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .mood-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .mood-btn {
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .mood-btn:hover, .mood-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-update {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-update:hover {
            transform: translateY(-1px);
        }

        /* 关注者视角提示 */
        .viewer-mode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
        }

        .viewer-mode strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        /* 发日志按钮 */
        .btn-post {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,107,53,0.4);
            transition: transform 0.2s;
            z-index: 100;
        }

        .btn-post:hover {
            transform: scale(1.1);
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .modal-body {
            padding: 20px;
        }

        .textarea-post {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <span class="rv-icon">🚐</span>
            <div class="header-title">
                <h1>房车环游中国</h1>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-item">
                <span class="stat-value" id="statDays">第1天</span>
                <span class="stat-label">旅行天数</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="statKm">0 km</span>
                <span class="stat-label">已行驶</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="statProvinces">0</span>
                <span class="stat-label">经过省份</span>
            </div>
        </div>

        <div class="current-location">
            <span>📍</span>
            <span id="currentLocation">准备出发</span>
        </div>
    </header>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 地图 -->
            <div class="map-section">
                <div class="section-header">
                    <span class="section-title">🗺️ 实时位置</span>
                    <span style="font-size:12px;color:#666;">点击地图更新位置</span>
                </div>
                <div id="map"></div>
                <div class="map-legend">
                    <div class="legend-item">
                        <span class="legend-dot" style="background:#ff6b35;"></span>
                        <span>当前位置</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background:#667eea;"></span>
                        <span>已走路线</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background:#ddd;"></span>
                        <span>计划路线</span>
                    </div>
                </div>
            </div>

            <!-- 旅行日志 -->
            <div class="logs-section">
                <div class="section-header">
                    <span class="section-title">📜 旅行日志</span>
                </div>
                <div class="logs-container" id="logsContainer">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel">
            <!-- 用户切换（仅团队成员可见） -->
            <div class="user-switcher" id="userSwitcher">
                <div class="switcher-title">👤 切换身份（团队成员）</div>
                <div class="user-list">
                    <div class="user-chip active" data-user="JCL">
                        <span class="user-chip-avatar">🧑‍✈️</span>
                        <span>JCL</span>
                    </div>
                    <div class="user-chip" data-user="PYJ">
                        <span class="user-chip-avatar">👩‍🍳</span>
                        <span>PYJ</span>
                    </div>
                    <div class="user-chip" data-user="LWJ">
                        <span class="user-chip-avatar">👨‍💻</span>
                        <span>LWJ</span>
                    </div>
                    <div class="user-chip" data-user="CYJ">
                        <span class="user-chip-avatar">👩‍📸</span>
                        <span>CYJ</span>
                    </div>
                </div>
            </div>

            <!-- 关注者提示 -->
            <div class="viewer-mode" id="viewerMode" style="display:none;">
                <strong>👀 关注者模式</strong>
                <span>你正在实时观看房车环游直播</span>
            </div>

            <!-- Agent卡片 -->
            <div class="agent-grid" id="agentGrid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 发日志按钮 -->
    <button class="btn-post" id="btnPost" onclick="openPostModal()">+</button>

    <!-- 发日志弹窗 -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 发布旅行日志</h3>
                <button class="modal-close" onclick="closePostModal()">&times;</button>
            </div>
            <div class="modal-body">
                <textarea class="textarea-post" id="postContent" placeholder="分享你的旅行瞬间..."></textarea>
                <button class="btn-submit" onclick="submitPost()">发布</button>
            </div>
        </div>
    </div>

    <!-- 个人活动时间轴弹窗 -->
    <div class="modal" id="timelineModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="timelineTitle">📋 活动记录</h3>
                <button class="modal-close" onclick="closeTimelineModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="timeline-filter" id="timelineFilter">
                    <button class="timeline-filter-btn active" data-filter="all">全部</button>
                    <button class="timeline-filter-btn" data-filter="activity">状态更新</button>
                    <button class="timeline-filter-btn" data-filter="location">位置变化</button>
                    <button class="timeline-filter-btn" data-filter="post">发布的日志</button>
                </div>
                <div class="timeline" id="agentTimeline">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 房车内部像素场景弹窗 -->
    <div class="modal" id="rvInteriorModal">
        <div class="modal-content rv-interior-modal" style="max-width: 900px; padding: 0; overflow: hidden;">
            <div class="rv-interior-container" id="rvInteriorContainer">
                <!-- 像素车内场景 -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
